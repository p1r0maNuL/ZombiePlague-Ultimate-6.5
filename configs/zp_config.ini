// Zombie Plague Ultimate 6.5 - Main Configuration
// Last Updated: 2026

// ==================== SERVER SETTINGS ====================

// Game mode selection
// 0 = Infection, 1 = Nemesis, 2 = Survivor, 3 = Sniper, 4 = Assassin
// 5 = Swarm, 6 = Multiple Infection, 7 = Plague, 8 = Assassins vs Sniper
// 9 = Armageddon, 10 = Dragon
zp_gamemode_selection 0

// Random game mode chance (1 in X rounds)
zp_random_gamemode_chance 30

// ==================== DIFFICULTY SETTINGS ====================

// Zombie HP multiplier (for difficulty)
zp_zombie_hp_multiplier 1.0

// Human HP multiplier
zp_human_hp_multiplier 1.0

// Zombie damage multiplier
zp_zombie_damage_multiplier 1.0

// Human damage multiplier
zp_human_damage_multiplier 1.0

// ==================== XP & LEVELS ====================

// XP for kill
zp_xp_kill 100

// XP for infect
zp_xp_infect 50

// XP per damage point
zp_xp_per_damage 1

// Level up cost formula: level * zp_levelup_cost
zp_levelup_cost 100

// ==================== CREDITS ====================

// Credits for kill
zp_credits_kill 50

// Credits for infect (zombie)
zp_credits_infect 25

// Credits per damage (divide by this)
zp_credits_per_damage 10

// Credits for time (every X seconds)
zp_time_presents_interval 180
zp_time_presents_amount 15

// ==================== RESPAWN ====================

// Respawn enabled for zombies
zp_zombie_respawn 1

// Respawn delay for zombies (seconds)
zp_zombie_respawn_delay 10

// Respawn enabled for humans
zp_human_respawn 0

// ==================== VIP ====================

// Enable VIP system
zp_vip_enabled 1

// VIP access type: 0 = SteamID, 1 = IP, 2 = Nickname
zp_vip_access_type 0

// Happy Hour enabled
zp_happy_hour_enabled 1

// Happy Hours (24h format, comma separated): 12,18,22
zp_happy_hours "12,18,22"

// Happy Hour duration (minutes)
zp_happy_hour_duration 30

// ==================== LOGGING ====================

// Enable detailed logging
zp_logging_enabled 1

// Log file path
zp_log_path "addons/amxmodx/logs/zp_"

// ==================== DATABASE ====================

// Database type: 0 = File, 1 = MySQL
zp_database_type 1

// MySQL Connection String (if type = 1)
zp_db_host "localhost"
zp_db_user "root"
zp_db_pass ""
zp_db_name "zombie_plague"
zp_db_port 3306
