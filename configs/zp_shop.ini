// Zombie Plague Ultimate 6.5 - Shop Configuration
// Last Updated: 2026

// ==================== SHOP GENERAL SETTINGS ====================

// Enable shop system
zp_shop_enabled 1

// Price multiplier (if you want to increase all prices)
zp_shop_price_multiplier 1.0

// ==================== DAILY BONUS ====================

// Daily bonus amount
zp_daily_bonus_amount 500

// Bonus cooldown (seconds - 86400 = 24 hours)
zp_daily_bonus_cooldown 86400

// ==================== SLOT MACHINE ====================

// Slot machine cost per spin
zp_slot_cost 100

// Slot machine win probabilities
zp_slot_loss_chance 50          // 50% chance to lose
zp_slot_small_win_chance 30     // 30% small win (x2.5)
zp_slot_medium_win_chance 15    // 15% medium win (x5)
zp_slot_jackpot_chance 5        // 5% jackpot (x20)

// Slot machine payouts
zp_slot_small_win_multiplier 2.5
zp_slot_medium_win_multiplier 5.0
zp_slot_jackpot_multiplier 20.0

// ==================== WEAPON SHOP PRICES ====================

zp_shop_m4a1_price 0            // Free (default spawn)
zp_shop_awp_price 5000          // AWP Dragon Lore
zp_shop_deagle_price 800        // Desert Eagle
zp_shop_shotgun_price 1200      // XM1014
zp_shop_m249_price 4000         // M249 LMG
zp_shop_ak47_price 2500         // AK47
zp_shop_famas_price 1500        // FAMAS
zp_shop_sg550_price 4500        // SG550

// ==================== UTILITY SHOP PRICES ====================

zp_shop_kevlar_price 650        // Kevlar Armor
zp_shop_health_pack_price 500   // +100 HP
zp_shop_flashbang_price 200     // Flashbang
zp_shop_smoke_price 300         // Smoke Grenade
zp_shop_hegrenade_price 400     // HE Grenade
zp_shop_c4_price 2000           // C4

// ==================== AMMO SHOP PRICES ====================

zp_shop_ammo_556_price 100      // 5.56mm (200 rounds)
zp_shop_ammo_9mm_price 80       // 9mm (100 rounds)
zp_shop_ammo_762_price 120      // 7.62mm (100 rounds)
zp_shop_ammo_338_price 150      // .338 (30 rounds)

// ==================== SPECIAL ITEMS PRICES ====================

zp_shop_xp_boost_price 2000     // +50% XP (1 round)
zp_shop_credits_boost_price 1500 // +50% Credits (1 round)
zp_shop_speed_boost_price 1000  // +20% Speed (1 round)
zp_shop_damage_boost_price 1200 // +30% Damage (1 round)
zp_shop_invincibility_price 5000 // 10 seconds invincibility
zp_shop_teleport_price 3000     // Teleport ability
